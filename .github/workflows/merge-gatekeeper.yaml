---
name: Merge Gatekeeper

on:
  pull_request:
    branches:
      - master

jobs:
  merge-gatekeeper:
    runs-on: ubuntu-slim
    permissions:
      checks: read
      statuses: read
    steps:
      - name: Run Merge Gatekeeper
        uses: tamcore/pr-merge-gatekeeper@5233d531797d71eabd59c9138739a652c5437a93 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
